<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Scene</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        width: 100vw;
        height: 100vh;
      }
      #app {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      canvas {
        display: block;
      }

      /* 快捷栏容器 - 改用 fixed 确保在视口最前方 */
      #hotbar {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        background-color: rgba(20, 20, 20, 0.8);
        padding: 10px;
        border-radius: 12px;
        z-index: 100; /* 调高 z-index */
        pointer-events: none;
        border: 2px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      /* 每个格子 */
      .slot {
        width: 64px;
        height: 64px;
        background-color: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
      }

      /* 选中状态 */
      .slot.selected {
        border-color: #00ffcc;
        background-color: rgba(0, 255, 204, 0.15);
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        transform: translateY(-10px) scale(1.1);
      }

      /* CSS 3D 方块图标容器 */
      .cube-icon {
        width: 28px;
        height: 28px;
        transform-style: preserve-3d;
        transform: rotateX(-25deg) rotateY(45deg);
        margin-bottom: 4px;
      }

      .face {
        position: absolute;
        width: 28px;
        height: 28px;
        border: 1px solid rgba(0,0,0,0.2);
        box-sizing: border-box;
      }

      /* 顶面 */
      .face.top {
        transform: rotateX(90deg) translateZ(14px);
        filter: brightness(1.3);
      }
      /* 正面 */
      .face.front {
        transform: translateZ(14px);
        filter: brightness(1.1);
      }
      /* 侧面 */
      .face.right {
        transform: rotateY(90deg) translateZ(14px);
        filter: brightness(0.8);
      }

      /* 物品说明文字 */
      .slot-text {
        color: #ddd;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.8;
      }
      .slot.selected .slot-text {
        color: #fff;
        opacity: 1;
        font-weight: bold;
      }

      /* 调试面板 (F3) */
      #debug-panel {
        position: fixed;
        top: 10px;
        left: 10px;
        background-color: rgba(0, 0, 0, 0.5);
        color: #00ffcc;
        padding: 10px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
        border-radius: 4px;
        z-index: 150;
        display: none; /* 默认隐藏 */
        pointer-events: none;
      }

      /* 背包 UI 样式 */
      #inventory-ui {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
        display: none; /* 默认隐藏 */
        z-index: 500;
        justify-content: center;
        align-items: center;
        color: #fff;
      }

      .inventory-window {
        background-color: #c6c6c6;
        border: 4px solid #373737;
        border-right-color: #fff;
        border-bottom-color: #fff;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
      }

      .inv-title {
        color: #3f3f3f;
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 16px;
      }

      .inv-grid {
        display: grid;
        grid-template-columns: repeat(9, 52px);
        grid-template-rows: repeat(3, 52px);
        gap: 2px;
      }

      .inv-hotbar-row {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(9, 52px);
        gap: 2px;
      }

      .inv-slot {
        width: 44px;
        height: 44px;
        background-color: #8b8b8b;
        border: 4px solid #373737;
        border-top-color: #ffffff;
        border-left-color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
      }

      .inv-slot:hover {
        background-color: #aaa;
      }

      .inv-slot .count {
        position: absolute;
        bottom: 2px;
        right: 2px;
        font-size: 14px;
        font-weight: bold;
        text-shadow: 2px 2px #000;
        pointer-events: none;
      }

      /* 合成区 */
      .crafting-container {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 24px;
        padding-bottom: 10px;
      }

      .craft-grid {
        display: grid;
        grid-template-columns: repeat(2, 52px);
        grid-template-rows: repeat(2, 52px);
        gap: 2px;
      }

      .craft-arrow {
        color: #3f3f3f;
        font-size: 32px;
        font-weight: bold;
      }

      /* 覆盖 3D 图标缩放适应小格子 */
      .inv-slot .cube-icon {
        transform: rotateX(-25deg) rotateY(45deg) scale(0.8);
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <!-- 确保 app 和 hotbar 是同级且 hotbar 在后/高 z-index -->
    <div id="app"></div>

    <!-- 背包 UI -->
    <div id="inventory-ui">
      <div class="inventory-window">
        <!-- 顶部合成区 -->
        <div class="crafting-container">
          <div>
            <div class="inv-title">Crafting</div>
            <div class="craft-grid" id="crafting-grid">
              <div class="inv-slot" data-type="craft" data-index="0"></div>
              <div class="inv-slot" data-type="craft" data-index="1"></div>
              <div class="inv-slot" data-type="craft" data-index="2"></div>
              <div class="inv-slot" data-type="craft" data-index="3"></div>
            </div>
          </div>
          <div class="craft-arrow">→</div>
          <div class="inv-slot" id="crafting-result" style="width: 52px; height: 52px;"></div>
        </div>

        <!-- 主背包 -->
        <div>
          <div class="inv-title">Inventory</div>
          <div class="inv-grid" id="main-inventory">
            <!-- 27 slots (index 9-35) -->
          </div>
        </div>

        <!-- 快捷栏同步显示 -->
        <div class="inv-hotbar-row" id="hotbar-inventory">
          <!-- 9 slots (index 0-8) -->
        </div>
      </div>
    </div>

    <!-- 调试面板 -->
    <div id="debug-panel">
      <div>FPS: <span id="debug-fps">0</span></div>
      <div>XYZ: <span id="debug-pos">0.00 / 0.00 / 0.00</span></div>
      <div>Chunk: <span id="debug-chunk">0, 0</span></div>
      <div>Biome: <span id="debug-biome">Unknown</span></div>
      <div>Mode: <span id="debug-mode">Survival</span></div>
    </div>
    
    <div id="hotbar">
      <!-- JS 动态生成内容 -->
    </div>

    <!-- 挖掘进度条 -->
    <div id="mining-progress-container" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, 30px); width: 100px; height: 10px; background-color: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; z-index: 200;">
      <div id="mining-progress" style="width: 0%; height: 100%; background-color: #00ffcc; border-radius: 3px;"></div>
    </div>

    <!-- HP UI -->
    <div id="hp-ui" style="position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); color: red; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 100;">
      HP: 20 / 20
    </div>

    <!-- Damage Flash Overlay -->
    <div id="damage-flash" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: red; opacity: 0; pointer-events: none; z-index: 10000; transition: opacity 0.1s;"></div>

    <!-- 开发者控制台 UI -->
    <div id="console-ui" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(0, 0, 0, 0.8); padding: 10px; z-index: 2000; box-sizing: border-box; font-family: monospace;">
      <div id="console-log" style="max-height: 150px; overflow-y: auto; color: #aaa; margin-bottom: 8px; font-size: 14px; display: flex; flex-direction: column; gap: 2px;"></div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="color: #00ffcc; font-weight: bold;">></span>
        <input id="console-input" type="text" style="flex-grow: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px;" placeholder="输入指令... (例如 /time 12)" autocomplete="off" />
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
